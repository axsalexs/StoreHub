<div class="sidebar-container">

  <div class="sidebar-header p-4 border-bottom" style="border-color: rgba(255,255,255,0.05) !important;">
    <div class="d-flex align-items-center mb-3">
      <mat-icon class="me-2" style="color: #f37021; font-size: 28px; width: 28px; height: 28px;">hub</mat-icon>
      <h3 class="text-white fw-bold mb-0" style="letter-spacing: 1px;">STORE<span style="color: #f37021">HUB</span></h3>
    </div>
  </div>

  <div class="sidebar-menu px-2 py-3 overflow-auto">

    <div class="menu-label mb-2">PRINCIPAL</div>
    <a routerLink="/dashboard-screen" routerLinkActive="active-link" class="nav-item">
      <mat-icon>dashboard</mat-icon> Dashboard
    </a>
    <a routerLink="/sales-pos-screen" routerLinkActive="active-link" class="nav-item">
      <mat-icon>point_of_sale</mat-icon> Punto de Venta
    </a>
    <a routerLink="/sales-history-screen" routerLinkActive="active-link" class="nav-item">
      <mat-icon>history</mat-icon> Historial de Ventas
    </a>

    <div class="menu-label mt-3 mb-2">GESTIÓN</div>
    <a routerLink="/products-list-screen" routerLinkActive="active-link" class="nav-item">
      <mat-icon>inventory_2</mat-icon> Productos
    </a>
    <a routerLink="/categories-list-screen" routerLinkActive="active-link" class="nav-item">
      <mat-icon>category</mat-icon> Categorías
    </a>
    <a routerLink="/clients-list-screen" routerLinkActive="active-link" class="nav-item">
      <mat-icon>people</mat-icon> Clientes
    </a>

    @if (rolUsuario === 'admin') {
      <div class="menu-label mt-3 mb-2">ADMINISTRACIÓN</div>
      <a routerLink="/inventory-movements-screen" routerLinkActive="active-link" class="nav-item">
        <mat-icon>swap_vert</mat-icon> Ajustes de Stock
      </a>
      <a routerLink="/reports-screen" routerLinkActive="active-link" class="nav-item">
        <mat-icon>bar_chart</mat-icon> Reportes y Ventas
      </a>
    }
  </div>

  <div class="sidebar-footer p-3 mt-auto">
    <button mat-button class="text-white-50 w-100 text-start rounded-1" routerLink="/login-screen">
      <mat-icon class="me-2">logout</mat-icon> Cerrar Sesión
    </button>
  </div>

</div>
