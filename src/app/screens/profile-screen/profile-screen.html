<div class="container py-5">
  <div class="row g-4 align-items-stretch">

    <div class="col-lg-4">
      <div class="card border-0 shadow-sm text-center p-4 h-100 d-flex flex-column">

        <div class="profile-avatar mb-3 mx-auto">
          <mat-icon>account_circle</mat-icon>
        </div>
        <h4 class="fw-bold mb-2">{{ usuario.nombre }}</h4>

        <div class="mb-4">
          <span class="role-badge">{{ usuario.rol }}</span>
        </div>

        <div class="text-start mt-auto pt-3 border-top">
          <div class="d-flex align-items-center mb-3">
            <mat-icon class="me-3 small-icon">email</mat-icon>
            <span class="small fw-semibold" style="color: #64748b;">{{ usuario.correo }}</span>
          </div>
          <div class="d-flex align-items-center">
            <mat-icon class="me-3 small-icon">calendar_today</mat-icon>
            <span class="small fw-semibold" style="color: #64748b;">Miembro desde:<br>{{ usuario.fechaIngreso | date:'longDate' }}</span>
          </div>
        </div>

      </div>
    </div>

    <div class="col-lg-8">
      <div class="card border-0 shadow-sm p-4 h-100">
        <h5 class="fw-bold mb-4" style="border-left: 4px solid #f37021; padding-left: 10px;">Configuración de la Cuenta</h5>

        <form [formGroup]="profileForm" (ngSubmit)="guardarCambios()" class="d-flex flex-column h-100">
          <div>
            <div class="row">
              <div class="col-md-6">
                <mat-form-field appearance="outline" class="w-100 mb-2">
                  <mat-label>Nombre Completo</mat-label>
                  <input matInput formControlName="nombre" (input)="validarNombre($event)">
                </mat-form-field>
              </div>
              <div class="col-md-6">
                <mat-form-field appearance="outline" class="w-100 mb-2">
                  <mat-label>Correo Electrónico</mat-label>
                  <input matInput formControlName="correo" type="email">
                </mat-form-field>
              </div>
            </div>

            <hr class="my-4" style="opacity: 0.1;">

            <h6 class="fw-bold mb-4" style="border-left: 4px solid #f37021; padding-left: 10px;">Seguridad</h6>

            <div class="row">
              <div class="col-md-6">
                <mat-form-field appearance="outline" class="w-100 mb-2">
                  <mat-label>Contraseña Actual</mat-label>
                  <input matInput type="password" formControlName="passwordActual" (input)="validarPassword($event, 'passwordActual')">
                </mat-form-field>
              </div>
              <div class="col-md-6">
                <mat-form-field appearance="outline" class="w-100 mb-2">
                  <mat-label>Nueva Contraseña</mat-label>
                  <input matInput type="password" formControlName="nuevaPassword" (input)="validarPassword($event, 'nuevaPassword')">
                </mat-form-field>
              </div>
            </div>
          </div>

          <div class="text-end mt-auto pt-4">
            <button mat-flat-button class="hub-form-button" type="submit" [disabled]="profileForm.invalid">
              GUARDAR CAMBIOS
            </button>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>
