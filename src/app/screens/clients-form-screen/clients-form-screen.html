      <div class="d-flex align-items-center mb-4">
        <button mat-icon-button routerLink="/clients-list-screen" class="me-2">
          <mat-icon>arrow_back</mat-icon>
        </button>
        <h2 class="fw-bold mb-0">Registro de Cliente</h2>
      </div>

      <div class="card border-0 shadow-sm p-4">
        <form [formGroup]="clientForm" (ngSubmit)="guardar()">

          <div class="row g-3">
            <div class="col-12">
              <mat-form-field appearance="outline" class="w-100">
                <mat-label>Nombre Completo</mat-label>
                <input matInput formControlName="nombre"
                       (input)="validarNombre($event)">
                <mat-icon matSuffix>person</mat-icon>
              </mat-form-field>
            </div>

            <div class="col-md-6">
              <mat-form-field appearance="outline" class="w-100">
                <mat-label>Teléfono</mat-label>
                <input matInput formControlName="telefono"
                       placeholder="2221234567"
                       (input)="validarTelefono($event)">
                <mat-icon matSuffix>phone</mat-icon>
              </mat-form-field>
            </div>

            <div class="col-md-6">
              <mat-form-field appearance="outline" class="w-100">
                <mat-label>Correo Electrónico</mat-label>
                <input matInput formControlName="email" type="email" placeholder="cliente@correo.com">
                <mat-icon matSuffix>email</mat-icon>
              </mat-form-field>
            </div>

            <div class="col-12">
              <mat-form-field appearance="outline" class="w-100">
                <mat-label>Dirección Física (Opcional)</mat-label>
                <textarea matInput formControlName="direccion" rows="2" maxlength="100"></textarea>
                <mat-icon matSuffix>location_on</mat-icon>
                <mat-hint align="end">{{clientForm.get('direccion')?.value?.length || 0}}/100</mat-hint>
              </mat-form-field>
            </div>
          </div>

          <div class="d-flex gap-3 justify-content-end border-top pt-4 mt-3">
            <button mat-button type="button" routerLink="/clients-list-screen">CANCELAR</button>
            <button mat-flat-button color="primary" type="submit" [disabled]="clientForm.invalid">
              <mat-icon class="me-2">save</mat-icon> GUARDAR CLIENTE
            </button>
          </div>

        </form>
      </div>
