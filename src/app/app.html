@if (showLayout) {
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav mode="side" opened class="sidebar-wrapper">
      <app-sidebar-partial></app-sidebar-partial>
    </mat-sidenav>

    <mat-sidenav-content>
      <app-header-partial></app-header-partial>

      <main class="main-content">
        <router-outlet></router-outlet>
      </main>

      <app-footer-partial></app-footer-partial>
    </mat-sidenav-content>
  </mat-sidenav-container>
}
@else {
  <router-outlet></router-outlet>
}
